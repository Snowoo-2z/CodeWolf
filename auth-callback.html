<!doctype html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Connexion — CodeWolf</title><link rel="icon" href="/assets/favicon.svg"><link rel="stylesheet" href="/css/styles.css"></head><body class="auth-body"><main class="auth-main" style="grid-column:1/-1"><section class="auth-card" style="text-align:center"><img src="/assets/wolfy.svg" alt="Wolfy" style="width:72px;margin:auto"><h2>Connexion à la meute…</h2><p class="muted" id="callbackStatus">Wolfy restaure ton parcours.</p></section></main><script src="/js/config.js"></script><script type="module">import {supabase} from '/js/auth.js';const status=document.getElementById('callbackStatus');try{const {data:{session},error}=await supabase.auth.getSession();if(error)throw error;if(!session)throw new Error('Session GitHub introuvable');const created=new Date(session.user.created_at).getTime(),lastSignIn=new Date(session.user.last_sign_in_at||0).getTime(),isNewAccount=Math.abs(lastSignIn-created)<120000&&!localStorage.getItem('codewolf_username');location.replace(isNewAccount?'/onboarding':'/dashboard')}catch(e){status.textContent='Connexion impossible : '+e.message;setTimeout(()=>location.replace('/signin'),2500)}</script></body></html>
