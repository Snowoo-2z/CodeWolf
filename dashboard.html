<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - CodeWolf</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="dashboard-body">

  <nav class="landing-nav">
    <div class="brand">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      <span>CodeWolf Dashboard</span>
    </div>
    <div class="toolbar">
      <span id="userGreeting" style="font-size: 13px; color: var(--text-muted);">Welcome</span>
      <button class="btn" onclick="logout()">Sign Out</button>
    </div>
  </nav>

  <main class="dashboard-main">
    <div class="empty-dashboard">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--accent-color)" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
      <h2>Your Dashboard is Ready</h2>
      <p>No projects created yet. Stay tuned for the editor interface!</p>
    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const username = localStorage.getItem('codewolf_username') || 'Developer';
      const aiName = localStorage.getItem('codewolf_ai_name') || 'Friend';
      document.getElementById('userGreeting').textContent = `Hello, ${username} (AI calls you: ${aiName})`;
    });

    function logout() {
      localStorage.removeItem('codewolf_logged_in');
      localStorage.removeItem('codewolf_username');
      localStorage.removeItem('codewolf_ai_name');
      location.href = 'index.html';
    }
  </script>
</body>
</html>
