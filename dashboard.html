<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - CodeWolf</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="dashboard-body">

  <nav class="landing-nav">
    <div class="brand">
      <img src="/assets/logo.svg" alt="CodeWolf Logo" style="width: 28px; height: auto;">
      <span>CodeWolf Dashboard</span>
    </div>
    <div class="nav-buttons">
      <span id="userGreeting" style="font-size: 13px; color: var(--text-muted); display: flex; align-items: center;">Welcome</span>
      <button class="btn" onclick="window.CodeWolfAuth.logout()">Sign Out</button>
    </div>
  </nav>

  <main class="dashboard-main">
    <div class="empty-dashboard">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--accent-color)" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
      <h2>Your Dashboard is Ready</h2>
      <p>No projects created yet. Stay tuned for the editor interface!</p>
    </div>
  </main>

  <script src="/js/config.js"></script>
  <script type="module" src="/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const user = await window.CodeWolfAuth.getUserSession();
      if (!user) {
        window.location.href = '/signin';
        return;
      }
      
      const username = localStorage.getItem('codewolf_username') || user.email?.split('@')[0] || 'Developer';
      const aiName = localStorage.getItem('codewolf_ai_name') || 'Assistant';
      document.getElementById('userGreeting').textContent = `Hello, ${username} (AI calls you: ${aiName})`;
    });
  </script>
</body>
</html>
