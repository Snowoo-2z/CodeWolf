<!doctype html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Ton profil — CodeWolf</title><link rel="icon" href="/assets/favicon.svg"><link rel="stylesheet" href="/css/styles.css"></head><body class="auth-body"><aside class="auth-aside"><a href="/"><img class="logo" src="/assets/logo.svg" alt="CodeWolf"></a><div class="auth-quote"><span class="eyebrow"><span class="dot"></span> Étape 1 sur 1</span><h1>Faisons <span class="gradient-text">connaissance.</span></h1><p class="muted">Quelques secondes suffisent pour personnaliser ton parcours.</p></div><small class="muted">Tes préférences restent modifiables.</small></aside><main class="auth-main"><section class="auth-card"><h2>Crée ton profil</h2><p class="muted">Wolfy utilisera ces informations pour personnaliser ton accompagnement.</p><form class="form" id="onboardingForm"><div class="form-group"><label for="usernameInput">Nom d’utilisateur</label><input id="usernameInput" autocomplete="username" placeholder="ex. tunisian_dev" required maxlength="24"></div><div class="form-group"><label for="aiNameInput">Comment Wolfy doit-il t’appeler ?</label><input id="aiNameInput" placeholder="ex. Alex, Capitaine…" required maxlength="30"></div><div class="form-group"><label for="levelInput">Ton niveau actuel</label><select id="levelInput"><option>Je débute</option><option>J’ai quelques bases</option><option>Je suis intermédiaire</option><option>Je suis avancé</option></select></div><button class="btn btn-primary btn-lg" type="submit">Entrer dans le studio →</button></form></section></main><script>document.getElementById('onboardingForm').addEventListener('submit',e=>{e.preventDefault();localStorage.setItem('codewolf_username',document.getElementById('usernameInput').value.trim());localStorage.setItem('codewolf_ai_name',document.getElementById('aiNameInput').value.trim());const memory={level:document.getElementById('levelInput').value,curriculumStep:1,goals:'Maîtriser le développement web',progress:0,xp:120};localStorage.setItem('codewolf_student_memory',JSON.stringify(memory));location.href='/dashboard';});</script></body></html>
