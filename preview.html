<!doctype html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Aperçu — CodeWolf</title><link rel="icon" href="/assets/favicon.svg"><style>*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:system-ui;background:#090d16;color:#eef2f8}.bar{height:48px;display:flex;align-items:center;gap:10px;padding:0 12px;background:#0d1320;border-bottom:1px solid #263149}.bar img{width:28px}.bar strong{font-size:12px}.bar small{color:#738198}.bar button{border:1px solid #2a3850;background:#141c2a;color:#dce5f2;border-radius:7px;padding:6px 10px;cursor:pointer}.bar .devices{display:flex;gap:4px;margin:auto}.bar .devices button.active{color:#66f7e8;border-color:#66f7e8}.stage{height:calc(100% - 48px);display:grid;place-items:center;padding:0;background:#111827}.frame{border:0;width:100%;height:100%;background:#fff;transition:.25s}.frame.tablet{width:768px;max-width:100%;height:94%;box-shadow:0 20px 60px #0008}.frame.mobile{width:390px;max-width:100%;height:90%;box-shadow:0 20px 60px #0008}@media(max-width:650px){.bar small,.bar>strong{display:none}.bar .devices{margin-left:auto}.stage{padding:0}}</style></head><body><header class="bar"><img src="/assets/favicon.svg" alt=""><strong>Aperçu réel</strong><small>Le document HTML complet est exécuté dans une fenêtre isolée.</small><div class="devices"><button data-size="desktop" class="active">Bureau</button><button data-size="tablet">Tablette</button><button data-size="mobile">Mobile</button></div><button onclick="location.reload()">↻</button></header><main class="stage"><iframe id="fullPreview" class="frame" sandbox="allow-scripts allow-forms allow-modals" title="Aperçu complet"></iframe></main><script>const frame=document.getElementById('fullPreview');function load(){frame.srcdoc=localStorage.getItem('codewolf_preview_document')||'<!doctype html><h1 style="font-family:system-ui">Ouvre un projet depuis le Studio.</h1>'}load();document.querySelector('.devices').onclick=e=>{const b=e.target.closest('button');if(!b)return;document.querySelectorAll('.devices button').forEach(x=>x.classList.remove('active'));b.classList.add('active');frame.className='frame '+(b.dataset.size==='desktop'?'':b.dataset.size)};addEventListener('storage',e=>{if(e.key==='codewolf_preview_document')load()});</script></body></html>
