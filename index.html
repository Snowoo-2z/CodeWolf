<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeWolf - AI-Powered Code & Agent Studio</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="landing-body">

  <nav class="landing-nav">
    <div class="brand">
      <img src="/assets/logo.svg" alt="CodeWolf Logo" style="width: 32px; height: auto;">
      <span>CodeWolf</span>
    </div>
    <div class="nav-buttons">
      <a href="/signin" class="btn">Sign In</a>
      <a href="/signin" class="btn btn-primary">Sign Up</a>
    </div>
  </nav>

  <main class="hero-section">
    <div class="hero-content">
      <span class="badge">Next-Gen AI Development</span>
      <h1>Build the future with <span class="gradient-text">CodeWolf</span></h1>
      <p>The ultimate collaborative environment for developers and intelligent AI agents. Fast, seamless, and mobile-friendly.</p>
      <div class="hero-cta">
        <button class="btn btn-primary btn-large" onclick="checkAuthAndRedirect()">Get Started Free</button>
        <a href="/signin" class="btn btn-large">Explore Features</a>
      </div>
    </div>
  </main>

  <script src="/js/config.js"></script>
  <script type="module" src="/js/auth.js"></script>
  <script>
    async function checkAuthAndRedirect() {
      const user = await window.CodeWolfAuth.getUserSession();
      if (user) {
        window.location.href = '/dashboard';
      } else {
        window.location.href = '/signin';
      }
    }
  </script>
</body>
</html>
