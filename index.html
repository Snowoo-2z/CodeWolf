<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeWolf - AI-Powered Code & Agent Studio</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="landing-body">

  <nav class="landing-nav">
    <div class="brand">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      <span>CodeWolf</span>
    </div>
    <div class="nav-buttons">
      <a href="/signin" class="btn">Sign In</a>
      <a href="/signin" class="btn btn-primary">Sign Up</a>
    </div>
  </nav>

  <main class="hero-section">
    <div class="hero-content">
      <span class="badge">Next-Gen AI Development</span>
      <h1>Build the future with <span class="gradient-text">CodeWolf</span></h1>
      <p>The ultimate collaborative environment for developers and intelligent AI agents. Fast, seamless, and mobile-friendly.</p>
      <div class="hero-cta">
        <button class="btn btn-primary btn-large" onclick="checkAuthAndRedirect()">Get Started Free</button>
        <a href="/signin" class="btn btn-large">Explore Features</a>
      </div>
    </div>
  </main>

  <script src="/js/auth.js"></script>
  <script>
    function checkAuthAndRedirect() {
      if (CodeWolfAuth.isLoggedIn()) {
        window.location.href = '/dashboard';
      } else {
        window.location.href = '/signin';
      }
    }
  </script>
</body>
</html>
